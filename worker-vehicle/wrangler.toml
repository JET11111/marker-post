# Cloudflare Worker config for the vehicle lookup relay.
# Easiest setup:  bash setup.sh   (prompts for the five secrets, deploys, tests)
# The name must stay "vehicle-lookup" — the app calls
# https://vehicle-lookup.<your-subdomain>.workers.dev/
name = "vehicle-lookup"
main = "worker.js"
compatibility_date = "2026-07-01"

[vars]
MOT_SCOPE = "https://tapi.dvsa.gov.uk/.default"

# Secrets (never in this file) — setup.sh sets them all, or manually:
#   npx wrangler secret put DVLA_KEY           DVLA VES API key
#   npx wrangler secret put MOT_CLIENT_ID      DVSA client id
#   npx wrangler secret put MOT_CLIENT_SECRET  DVSA client secret
#   npx wrangler secret put MOT_API_KEY        DVSA API key
#   npx wrangler secret put MOT_TOKEN_URL      DVSA OAuth token URL (per-tenant)
