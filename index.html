<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1a" />
  <title>Marker Post</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-text">Marker Post<small>Hampshire</small></span>
    </div>
    <div class="gps">
      <span id="gps-dot" class="dot"></span>
      <span id="status" class="status">Starting</span>
      <span id="acc" class="acc"></span>
      <span id="offline" class="pill-offline hidden">OFFLINE</span>
    </div>
  </header>

  <main>
    <!-- NEAREST VIEW -->
    <section id="view-nearest" class="view">
      <div class="instrument">
        <div class="eyebrow">Nearest marker post</div>
        <div id="np-ref" class="ref">—</div>
        <div class="pills">
          <span id="np-road" class="pill pill-road">—</span>
          <span id="np-cwy" class="pill">—</span>
        </div>

        <div class="readout">
          <div class="readout-val"><span id="np-dist">—</span></div>
          <div class="readout-lbl">distance to post</div>
        </div>

        <div id="np-jct-row" class="jct-row hidden">
          <span class="jct-lbl">Nearest junction</span>
          <span class="jct-val"><span id="np-jct">—</span><span id="np-jct-dist" class="jct-dist"></span></span>
        </div>

        <div id="np-meta" class="meta">Waiting for GPS…</div>
      </div>

      <label class="switch">
        <span>Prefer my direction of travel</span>
        <input type="checkbox" id="heading-toggle" checked />
        <span class="track"><span class="thumb"></span></span>
      </label>
    </section>

    <!-- GO TO POST VIEW -->
    <section id="view-goto" class="view hidden">
      <div class="card">
        <label class="fld">
          <span class="fld-lbl">Quick entry</span>
          <input id="g-quick" type="text" inputmode="text" autocomplete="off"
                 placeholder='e.g. "M27 13.6 A"' />
        </label>

        <div class="divider"><span>or set manually</span></div>

        <label class="fld">
          <span class="fld-lbl">Road</span>
          <select id="g-road"></select>
        </label>
        <div class="row">
          <label class="fld">
            <span class="fld-lbl">Distance (km)</span>
            <input id="g-dist" type="number" inputmode="decimal" step="0.1" min="0" placeholder="13.6" />
          </label>
          <label class="fld fld-narrow">
            <span class="fld-lbl">Dir</span>
            <select id="g-dir"></select>
          </label>
        </div>
        <div id="g-hint" class="hint"></div>
        <button id="g-find" class="btn btn-primary">Find post</button>
      </div>

      <div id="g-result" class="card result hidden">
        <div class="eyebrow">Marker post</div>
        <div id="r-ref" class="ref ref-result">—</div>
        <div id="r-detail" class="result-detail"></div>
        <a id="r-waze" class="btn btn-waze" target="_blank" rel="noopener">
          <span class="waze-mark"></span> Open in Waze
        </a>
      </div>
    </section>
  </main>

  <nav class="tabs">
    <button class="tab active" data-view="nearest">
      <span class="tab-ico" aria-hidden="true">◎</span> Nearest
    </button>
    <button class="tab" data-view="goto">
      <span class="tab-ico" aria-hidden="true">➔</span> Go to post
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
