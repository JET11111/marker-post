<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d2235" />
  <title>Marker Post</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="statusbar">
    <span id="status" class="status">Starting…</span>
    <span id="offline" class="badge hidden">OFFLINE</span>
  </header>

  <main>
    <!-- NEAREST VIEW -->
    <section id="view-nearest" class="view">
      <div class="card big">
        <div class="label">Nearest marker post</div>
        <div id="np-ref" class="ref">—</div>
        <div id="np-road" class="road">—</div>
        <div id="np-dist" class="dist">—</div>
        <div id="np-meta" class="meta">Waiting for GPS…</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="heading-toggle" checked />
        Prefer my direction of travel
      </label>
    </section>

    <!-- GO TO POST VIEW -->
    <section id="view-goto" class="view hidden">
      <div class="card">
        <label class="fld">Quick entry (e.g. "M27 13.6 A")
          <input id="g-quick" type="text" inputmode="text" autocomplete="off"
                 placeholder="road  distance  direction" />
        </label>
        <hr />
        <label class="fld">Road
          <select id="g-road"></select>
        </label>
        <div class="row">
          <label class="fld">Distance (km)
            <input id="g-dist" type="number" inputmode="decimal" step="0.1" min="0" placeholder="13.6" />
          </label>
          <label class="fld">Dir
            <select id="g-dir"></select>
          </label>
        </div>
        <div id="g-hint" class="hint"></div>
        <button id="g-find" class="btn">Find post</button>

        <div id="g-result" class="result hidden">
          <div class="result-ref"><span id="r-ref">—</span></div>
          <div id="r-detail" class="result-detail"></div>
          <a id="r-waze" class="btn waze" target="_blank" rel="noopener">Open in Waze</a>
        </div>
      </div>
    </section>
  </main>

  <nav id="tabs">
    <button class="tab active" data-view="nearest">Nearest</button>
    <button class="tab" data-view="goto">Go to post</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
